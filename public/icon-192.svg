<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Tavryne Wallpapers</title>
  <desc>A tribal, tattoo-inspired triskele: three thorned flame-arms spiraling outward from a central focal point, rendered in a deep emerald-to-jade gradient on a near-black background. Adorned with corner flourishes, a dashed outer ring, and a luminous green core.</desc>
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0d2017"/>
      <stop offset="55%" stop-color="#040a06"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="armGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="45%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="armGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="armGrad3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff84" stop-opacity="1"/>
      <stop offset="40%" stop-color="#10b981" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#022c22" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <g stroke="url(#armGrad)" stroke-width="2" fill="none" opacity="0.32" stroke-linecap="round">
    <path d="M 30 110 C 30 60, 60 30, 110 30"/>
    <path d="M 110 30 C 92 30, 78 44, 78 62"/>
    <path d="M 110 30 C 128 30, 142 44, 142 62"/>
    <path d="M 30 110 C 30 86, 44 72, 62 72"/>
    <circle cx="30" cy="110" r="3" fill="url(#armGrad)" stroke="none"/>
    <circle cx="110" cy="30" r="3" fill="url(#armGrad)" stroke="none"/>
  </g>
  <g stroke="url(#armGrad)" stroke-width="2" fill="none" opacity="0.32" stroke-linecap="round">
    <path d="M 402 30 C 452 30, 482 60, 482 110"/>
    <path d="M 482 110 C 482 86, 468 72, 450 72"/>
    <path d="M 482 110 C 482 134, 468 148, 450 148"/>
    <circle cx="402" cy="30" r="3" fill="url(#armGrad)" stroke="none"/>
    <circle cx="482" cy="110" r="3" fill="url(#armGrad)" stroke="none"/>
  </g>
  <g stroke="url(#armGrad)" stroke-width="2" fill="none" opacity="0.32" stroke-linecap="round">
    <path d="M 482 402 C 482 452, 452 482, 402 482"/>
    <path d="M 402 482 C 420 482, 434 468, 434 450"/>
    <path d="M 402 482 C 384 482, 370 468, 370 450"/>
    <circle cx="482" cy="402" r="3" fill="url(#armGrad)" stroke="none"/>
    <circle cx="402" cy="482" r="3" fill="url(#armGrad)" stroke="none"/>
  </g>
  <g stroke="url(#armGrad)" stroke-width="2" fill="none" opacity="0.32" stroke-linecap="round">
    <path d="M 110 482 C 60 482, 30 452, 30 402"/>
    <path d="M 30 402 C 30 426, 44 440, 62 440"/>
    <path d="M 30 402 C 30 378, 44 364, 62 364"/>
    <circle cx="110" cy="482" r="3" fill="url(#armGrad)" stroke="none"/>
    <circle cx="30" cy="402" r="3" fill="url(#armGrad)" stroke="none"/>
  </g>

  <g transform="translate(256 256)" opacity="0.28">
    <circle r="218" fill="none" stroke="url(#armGrad)" stroke-width="1.5"/>
    <circle r="208" fill="none" stroke="url(#armGrad)" stroke-width="0.5" stroke-dasharray="2 9"/>
    <g fill="url(#armGrad)">
      <circle cx="0" cy="-218" r="3"/>
      <circle cx="189" cy="-109" r="3"/>
      <circle cx="189" cy="109" r="3"/>
      <circle cx="0" cy="218" r="3"/>
      <circle cx="-189" cy="109" r="3"/>
      <circle cx="-189" cy="-109" r="3"/>
    </g>
  </g>

  <g transform="translate(256 256)" filter="url(#softGlow)">
    <g>
      <path d="M 0 -8
               C 10 -50, 50 -90, 100 -110
               C 150 -125, 190 -110, 195 -65
               C 198 -30, 175 -10, 145 -2
               C 165 -8, 180 -22, 178 -45
               C 175 -20, 145 0, 110 8
               C 70 18, 30 14, 0 -8 Z"
            fill="none" stroke="url(#armGrad)" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 0 -8
               C 10 -50, 50 -90, 100 -110
               C 150 -125, 190 -110, 195 -65
               C 198 -30, 175 -10, 145 -2
               C 165 -8, 180 -22, 178 -45
               C 175 -20, 145 0, 110 8
               C 70 18, 30 14, 0 -8 Z"
            fill="none" stroke="url(#armGrad)" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    </g>

    <g transform="rotate(120)">
      <path d="M 0 -8
               C 10 -50, 50 -90, 100 -110
               C 150 -125, 190 -110, 195 -65
               C 198 -30, 175 -10, 145 -2
               C 165 -8, 180 -22, 178 -45
               C 175 -20, 145 0, 110 8
               C 70 18, 30 14, 0 -8 Z"
            fill="none" stroke="url(#armGrad2)" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 0 -8
               C 10 -50, 50 -90, 100 -110
               C 150 -125, 190 -110, 195 -65
               C 198 -30, 175 -10, 145 -2
               C 165 -8, 180 -22, 178 -45
               C 175 -20, 145 0, 110 8
               C 70 18, 30 14, 0 -8 Z"
            fill="none" stroke="url(#armGrad2)" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    </g>

    <g transform="rotate(240)">
      <path d="M 0 -8
               C 10 -50, 50 -90, 100 -110
               C 150 -125, 190 -110, 195 -65
               C 198 -30, 175 -10, 145 -2
               C 165 -8, 180 -22, 178 -45
               C 175 -20, 145 0, 110 8
               C 70 18, 30 14, 0 -8 Z"
            fill="none" stroke="url(#armGrad3)" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 0 -8
               C 10 -50, 50 -90, 100 -110
               C 150 -125, 190 -110, 195 -65
               C 198 -30, 175 -10, 145 -2
               C 165 -8, 180 -22, 178 -45
               C 175 -20, 145 0, 110 8
               C 70 18, 30 14, 0 -8 Z"
            fill="none" stroke="url(#armGrad3)" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    </g>
  </g>

  <g transform="translate(256 256)" fill="url(#armGrad)">
    <g>
      <polygon points="65,-100 80,-118 60,-92"/>
      <polygon points="135,-95 158,-105 130,-78"/>
    </g>
    <g transform="rotate(120)">
      <polygon points="65,-100 80,-118 60,-92"/>
      <polygon points="135,-95 158,-105 130,-78"/>
    </g>
    <g transform="rotate(240)">
      <polygon points="65,-100 80,-118 60,-92"/>
      <polygon points="135,-95 158,-105 130,-78"/>
    </g>
  </g>

  <g transform="translate(256 256)">
    <circle r="38" fill="url(#centerGlow)"/>
    <circle r="22" fill="none" stroke="url(#armGrad2)" stroke-width="2" opacity="0.7"/>
    <circle r="14" fill="#022c22"/>
    <circle r="11" fill="url(#armGrad)"/>
    <circle r="5" fill="#00ff84"/>
    <circle r="2" fill="#ffffff"/>
  </g>
</svg>
